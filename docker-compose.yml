services:
  db:
    image: pgvector/pgvector:pg16
    container_name: greenflow-db
    environment:
      POSTGRES_USER: greenflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenflow}
      POSTGRES_DB: greenflow
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenflow -d greenflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: greenflow-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-greenflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-greenflow-minio-dev}
    expose:
      - "9000"   # S3 API (internal only; objects are proxied via the API /media route)
      - "9001"   # web console (internal)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: greenflow-api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://greenflow:${POSTGRES_PASSWORD:-greenflow}@db:5432/greenflow
      STORAGE_DIR: /app/storage
      IDF_PATH: /app/data/greenflow_archetype.idf
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-greenflow}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-greenflow-minio-dev}
      S3_BUCKET: ${S3_BUCKET:-greenflow}
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data:ro
      # BGE-M3 + bge-reranker-v2-m3 weights (~4GB) live here, downloaded once on
      # first use and persisted — keeps them out of the image.
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: greenflow-web
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NEXT_PUBLIC_WS_BASE: /ws
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: greenflow-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  hf_cache:
  minio_data:

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: greenflow-db
    environment:
      POSTGRES_USER: greenflow
      POSTGRES_PASSWORD: greenflow
      POSTGRES_DB: greenflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenflow -d greenflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: greenflow-api
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://greenflow:greenflow@db:5432/greenflow
      STORAGE_DIR: /app/storage
      IDF_PATH: /app/data/greenflow_archetype.idf
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: greenflow-web
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NEXT_PUBLIC_WS_BASE: /ws
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: greenflow-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pgdata:
  caddy_data:
  caddy_config:
